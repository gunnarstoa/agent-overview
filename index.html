<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Pages · Test</title>
<style>
  body {
    margin: 0;
    background: #0a0c0f;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    text-align: center;
    padding: 3rem 4rem;
    border: 1px solid rgba(29,158,117,0.3);
    border-radius: 16px;
    background: #111418;
  }
  .dot {
    width: 12px; height: 12px;
    background: #1D9E75;
    border-radius: 50%;
    display: inline-block;
    margin-bottom: 1.5rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(29,158,117,0.4); }
    50%      { box-shadow: 0 0 0 10px rgba(29,158,117,0); }
  }
  h1 { font-size: 1.4rem; margin: 0 0 0.5rem; color: #fff; }
  p  { font-size: 0.85rem; color: #5a6578; margin: 0; }
  .ts { margin-top: 1.5rem; font-size: 0.75rem; color: #2a6e50; }
</style>
</head>
<body>
<div class="card">
  <div class="dot"></div>
  <h1>GitHub Pages is working</h1>
  <p>openclaw · agent-viz repo</p>
  <div class="ts" id="ts"></div>
</div>
<script>
  document.getElementById('ts').textContent = 'loaded ' + new Date().toLocaleString();
</script>
</body>
</html>
